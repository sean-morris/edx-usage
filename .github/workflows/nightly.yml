name: Nightly Dashboard Update

on:
  schedule:
    - cron: "0 6 * * *"   # 6am UTC every night (10pm PT / 11pm PDT)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yaml
          activate-environment: edx-usage
          auto-activate-base: false

      - name: Run pipeline
        shell: bash -el {0}
        env:
          JUPYTERHUB_TOKEN: ${{ secrets.JUPYTERHUB_TOKEN }}
        run: python main.py

      - name: Commit and push dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --cached --quiet || git commit -m "chore: nightly dashboard update $(date -u +%Y-%m-%d)"
          git push
